name: Deploy to Dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy (Dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests before deploy
        run: |
          cat > .env <<EOF
          APP_NAME=relivo-be-server
          VERSION=0.1.0
          ENVIRONMENT=test
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/relivo
          OPENAI_API_KEY=sk-test-key
          OPENAI_MODEL=gpt-4o-mini
          EOF
          uv run pytest tests/ -v

      - name: Build Docker image
        run: |
          docker build -t relivo-be-server:dev-${{ github.sha }} .

      # Add your deployment steps here (e.g., push to registry, deploy to cloud)
      # Example for GCP / Railway / Render / Fly.io:
      # - name: Deploy to dev environment
      #   run: <your deploy command>
