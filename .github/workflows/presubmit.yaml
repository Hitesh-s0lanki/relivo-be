name: Presubmit

on:
  pull_request:
    branches:
      - main
      - release

jobs:
  checks:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Create .env file
        run: |
          cat > .env <<EOF
          APP_NAME=relivo-be-server
          VERSION=0.1.0
          ENVIRONMENT=test
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/relivo
          OPENAI_API_KEY=sk-test-key
          RELIVO_CHAT_MODEL=gpt-5-mini
          FIRECRAWL_MCP_ENABLED=false
          EOF

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker image builds
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: relivo-be-server:pr-${{ github.event.pull_request.number }}
